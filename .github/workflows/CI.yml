name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------- Fast PR feedback: cargo test on the zero-dep Rust cores ----------
  rust-test:
    name: Rust core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (black76_rust + bsm_rust)
        run: cargo test --release -p black76_rust -p bsm_rust

  # ---------- Parity test on Linux: build the wheel, install, run bench ----------
  parity-linux:
    name: Parity vs py_vollib (Linux)
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin + baselines
        run: pip install maturin 'py_vollib==1.0.1' 'py_lets_be_rational==1.0.1' numpy
      - name: maturin develop
        run: maturin develop --release
      - name: Run parity + bench
        run: python bench/bench_parity.py

  # ---------- Build abi3 wheels for all target platforms ----------
  build-wheels:
    name: Wheel ${{ matrix.os }} ${{ matrix.target }}
    needs: rust-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64,  manylinux: '2_17' }
          - { os: ubuntu-latest,  target: aarch64, manylinux: '2_17' }
          - { os: macos-13,       target: x86_64,  manylinux: '' }
          - { os: macos-14,       target: aarch64, manylinux: '' }
          - { os: windows-latest, target: x64,     manylinux: '' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build wheel (Linux/macOS)
        if: runner.os != 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter '3.12'
          manylinux: ${{ matrix.manylinux }}
          sccache: 'true'
      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter '3.12'
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ---------- Build sdist ----------
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------- Publish to PyPI on `v*` tag push via OIDC trusted publishing ----------
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [parity-linux, build-wheels, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/opengreeks
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: List artifacts
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
